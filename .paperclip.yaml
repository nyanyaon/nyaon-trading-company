schema: paperclip/v1
agents:
  ceo:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    inputs:
      env:
        NYAON_AGENT_ROLE:
          kind: literal
          value: ceo
        BINANCE_TESTNET_API_KEY:
          kind: secret
          requirement: required
        BINANCE_TESTNET_API_SECRET:
          kind: secret
          requirement: required
        BINANCE_LIVE_API_KEY:
          kind: secret
          requirement: optional
        BINANCE_LIVE_API_SECRET:
          kind: secret
          requirement: optional
  cro:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    inputs:
      env:
        NYAON_AGENT_ROLE:
          kind: literal
          value: cro
        BINANCE_TESTNET_API_KEY:
          kind: secret
          requirement: required
        BINANCE_TESTNET_API_SECRET:
          kind: secret
          requirement: required
        BINANCE_LIVE_API_KEY:
          kind: secret
          requirement: optional
        BINANCE_LIVE_API_SECRET:
          kind: secret
          requirement: optional
  quant:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
    inputs:
      env:
        NYAON_AGENT_ROLE:
          kind: literal
          value: quant
        BINANCE_TESTNET_API_KEY:
          kind: secret
          requirement: required
        BINANCE_TESTNET_API_SECRET:
          kind: secret
          requirement: required
        BINANCE_LIVE_API_KEY:
          kind: secret
          requirement: optional
        BINANCE_LIVE_API_SECRET:
          kind: secret
          requirement: optional
  trader:
    adapter:
      type: claude_local
      config:
        model: claude-haiku-4-5-20251001
    inputs:
      env:
        NYAON_AGENT_ROLE:
          kind: literal
          value: trader
        BINANCE_TESTNET_API_KEY:
          kind: secret
          requirement: required
        BINANCE_TESTNET_API_SECRET:
          kind: secret
          requirement: required
        BINANCE_LIVE_API_KEY:
          kind: secret
          requirement: optional
        BINANCE_LIVE_API_SECRET:
          kind: secret
          requirement: optional
  ops:
    adapter:
      type: claude_local
      config:
        model: claude-haiku-4-5-20251001
    inputs:
      env:
        NYAON_AGENT_ROLE:
          kind: literal
          value: ops
        BINANCE_TESTNET_API_KEY:
          kind: secret
          requirement: required
        BINANCE_TESTNET_API_SECRET:
          kind: secret
          requirement: required
        BINANCE_LIVE_API_KEY:
          kind: secret
          requirement: optional
        BINANCE_LIVE_API_SECRET:
          kind: secret
          requirement: optional
routines:
  quant-tick:
    triggers:
      - kind: schedule
        cronExpression: "*/15 * * * *"
        timezone: UTC
  cro-tick:
    triggers:
      - kind: schedule
        cronExpression: "* * * * *"
        timezone: UTC
  trader-tick:
    triggers:
      - kind: schedule
        cronExpression: "* * * * *"
        timezone: UTC
  ops-reconcile:
    triggers:
      - kind: schedule
        cronExpression: "*/5 * * * *"
        timezone: UTC
  ceo-weekly-retro:
    triggers:
      - kind: schedule
        cronExpression: "0 23 * * 0"
        timezone: UTC
  promotion-audit:
    triggers:
      - kind: schedule
        cronExpression: "0 22 * * 0"
        timezone: UTC
