      type: claude_local
      config:
        model: claude-haiku-4-5-20251001
    inputs:
      env:
        BINANCE_TESTNET_API_KEY:
          kind: secret
          requirement: required
        BINANCE_TESTNET_API_SECRET:
          kind: secret
